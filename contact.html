<!DOCTYPE html>
<html>

    <head>

        <title> Contact Me </title>
        <link rel="stylesheet" href="style.css">
        <script>
            function fun() {
                var name = document.forms["contactForm"]["fullname"].value;
                var emaill = document.forms["contactForm"]["email"].value;
                var countryy = document.forms["contactForm"]["country"].value;
                var comment = document.forms["contactForm"]["comments"].value;
                if (name == "" || emaill == "" || countryy == "" || comment == ""){
                    alert("Please fill the empty fields!!");
                    return false;
                }
                alert("Thanks for submitting :)");
                return true;
            }
        </script>
        
    </head>

    <body class="contact-page">
        
        
        <nav>
            <a href="index.html">Home</a>
        </nav>
        <hr/>
        
        <h2>Fill the form to reach us</h2>
        <form name="contactForm" onsubmit="return fun()">
            <label>Full Name:</label>
                <input type="text" name="fullname" placeholder="Enter your FullName">
                <br/><br/>
        
            <label>Email:</label>
                <input type="email" name="email" placeholder="Enter your Email">
                <br/><br/>

            <label>Country:</label>
                <input type="text" name="country" placeholder="Enter your Country">
                <br/><br/>

            <label>Comments:</label>
                <textarea name="comments" rows="5" cols="40" placeholder="Your comments here..."></textarea>
                <br/><br/>

            <input type="submit">
        </form>

    </body>

</html>
